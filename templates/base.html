<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AnyTLS Panel{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0f1117; --card: #1a1d27; --border: #2a2d3a;
            --text: #e4e6f0; --text2: #8b8fa3; --accent: #6c5ce7;
            --accent2: #a29bfe; --green: #00b894; --red: #ff6b6b;
            --orange: #fdcb6e; --blue: #74b9ff;
        }
        body { font-family: -apple-system, 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 220px;
            background: var(--card); border-right: 1px solid var(--border); padding: 20px 0; z-index: 100;
        }
        .sidebar .logo { text-align: center; padding: 10px 20px 30px; }
        .sidebar .logo .title { font-size: 22px; font-weight: 700; color: var(--accent2); }
        .sidebar .logo .sub { color: var(--text2); font-size: 12px; margin-top: 4px; }
        .sidebar a {
            display: flex; align-items: center; gap: 10px; padding: 12px 24px;
            color: var(--text2); text-decoration: none; font-size: 14px;
            transition: all 0.2s; border-left: 3px solid transparent;
        }
        .sidebar a:hover, .sidebar a.active { color: var(--text); background: rgba(108,92,231,0.1); border-left-color: var(--accent); }
        .sidebar .bottom { position: absolute; bottom: 20px; left: 0; right: 0; }

        .main { margin-left: 220px; padding: 24px 32px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .header h1 { font-size: 24px; font-weight: 600; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-2px); }
        .stat-card .label { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .value.green { color: var(--green); }
        .stat-card .value.blue { color: var(--blue); }
        .stat-card .value.orange { color: var(--orange); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card h2 { font-size: 16px; margin-bottom: 16px; color: var(--text2); }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 12px; color: var(--text2); border-bottom: 1px solid var(--border); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        tr:hover { background: rgba(108,92,231,0.05); }
        tr.clickable { cursor: pointer; }
        tr.clickable:hover { background: rgba(108,92,231,0.1); }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-green { background: rgba(0,184,148,0.15); color: var(--green); }
        .badge-red { background: rgba(255,107,107,0.15); color: var(--red); }
        .badge-orange { background: rgba(253,203,110,0.15); color: var(--orange); }
        .badge-blue { background: rgba(116,185,255,0.15); color: var(--blue); }

        .progress { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; margin-top: 6px; }
        .progress-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .progress-bar.green { background: var(--green); }
        .progress-bar.orange { background: var(--orange); }
        .progress-bar.red { background: var(--red); }

        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 8px; font-size: 13px;
            border: none; cursor: pointer; transition: all 0.2s; text-decoration: none;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent2); }
        .btn-danger { background: rgba(255,107,107,0.15); color: var(--red); }
        .btn-danger:hover { background: rgba(255,107,107,0.3); }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-green { background: rgba(0,184,148,0.15); color: var(--green); }
        .btn-green:hover { background: rgba(0,184,148,0.3); }

        input, textarea, select {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 8px 12px; border-radius: 8px; font-size: 14px; width: 100%;
            outline: none; transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent); }
        label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
        .form-group { margin-bottom: 14px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 200; justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 24px; width: 90%; max-width: 560px; max-height: 80vh; overflow-y: auto;
        }
        .modal h3 { margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

        .flash { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .flash-success { background: rgba(0,184,148,0.15); color: var(--green); border: 1px solid rgba(0,184,148,0.3); }
        .flash-error { background: rgba(255,107,107,0.15); color: var(--red); border: 1px solid rgba(255,107,107,0.3); }

        .breadcrumb { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; font-size: 13px; color: var(--text2); }
        .breadcrumb a { color: var(--accent); text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb .sep { color: var(--border); }

        .empty-state { text-align: center; padding: 48px 20px; color: var(--text2); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { margin-bottom: 16px; }

        .account-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; cursor: pointer; transition: all 0.2s;
        }
        .account-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .account-card .name { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .account-card .meta { font-size: 13px; color: var(--text2); margin-bottom: 12px; }
        .account-card .footer { display: flex; justify-content: space-between; align-items: center; }

        .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; padding: 16px; }
            .stats { grid-template-columns: 1fr 1fr; }
            .accounts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <div class="title">⚡ AnyTLS</div>
            <div class="sub">节点统一管理面板</div>
        </div>
        <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">📊 仪表盘</a>
        <a href="{{ url_for('accounts_list') }}" class="{{ 'active' if request.endpoint in ['accounts_list', 'account_detail'] }}">👤 账号管理</a>
        <a href="{{ url_for('nodes_monitor') }}" class="{{ 'active' if request.endpoint == 'nodes_monitor' }}">📡 节点检测</a>
        <div class="bottom">
            <a href="#" onclick="openModal('pwModal')">🔑 修改密码</a>
            <a href="{{ url_for('logout') }}">🚪 退出登录</a>
        </div>
    </div>

    <div class="main">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal-overlay" id="pwModal">
        <div class="modal" style="max-width:400px">
            <h3>🔑 修改密码</h3>
            <form method="POST" action="{{ url_for('change_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label>原密码</label>
                    <input type="password" name="old_password" required>
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="new_password" required>
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" name="confirm_password" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-ghost" onclick="closeModal('pwModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
        });
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const t = document.createElement('div');
                t.textContent = '已复制';
                t.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#6c5ce7;color:#fff;padding:8px 16px;border-radius:8px;z-index:999;font-size:13px;';
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 1500);
            });
        }
    </script>
</body>
</html>
