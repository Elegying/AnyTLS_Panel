<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AnyTLS Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0f1117; color: #e4e6f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-box {
            background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 16px;
            padding: 40px; width: 380px; text-align: center;
        }
        .login-box h1 { font-size: 24px; margin-bottom: 6px; color: #a29bfe; }
        .login-box .sub { color: #8b8fa3; font-size: 13px; margin-bottom: 30px; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 13px; color: #8b8fa3; margin-bottom: 6px; }
        input {
            width: 100%; padding: 10px 14px; background: #0f1117; border: 1px solid #2a2d3a;
            color: #e4e6f0; border-radius: 8px; font-size: 14px; outline: none;
        }
        input:focus { border-color: #6c5ce7; }
        .btn { width: 100%; padding: 12px; background: #6c5ce7; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; margin-top: 10px; }
        .btn:hover { background: #a29bfe; }
        .flash { padding: 10px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; background: rgba(255,107,107,0.15); color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 AnyTLS</h1>
        <p class="sub">节点统一管理面板</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="admin" autofocus required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn">登 录</button>
        </form>
    </div>
</body>
</html>
